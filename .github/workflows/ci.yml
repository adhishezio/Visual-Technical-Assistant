name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run Ruff
        run: ruff check backend tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install type-check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-linux.txt
          python -m pip install mypy

      - name: Run mypy
        run: mypy backend tests

  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      ENVIRONMENT: test
      VECTOR_STORE: chroma
      EMBEDDING_PROVIDER: hashing
      CHROMA_PERSIST_DIRECTORY: .chroma-ci
      VISION_PROVIDER: none
      OCR_PROVIDER: none
      SEARCH_PROVIDER: none
      IDENTIFICATION_CONFIDENCE_THRESHOLD: "0.5"
      PART_NUMBER_CONFIDENCE_THRESHOLD: "0.75"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-linux.txt
          python -m pip install pytest pytest-cov

      - name: Run pytest with coverage
        run: |
          pytest tests --cov=backend --cov-report=term-missing --cov-report=xml | tee coverage.txt

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.txt
            coverage.xml

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: coverage.txt

