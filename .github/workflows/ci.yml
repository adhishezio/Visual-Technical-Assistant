name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run Ruff
        run: ruff check backend tests

  typecheck:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install type-check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-linux.txt
          python -m pip install mypy pytest types-requests

      - name: Run mypy
        run: python -m mypy --config-file mypy.ini backend tests

  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      ENVIRONMENT: test
      VECTOR_STORE: chroma
      EMBEDDING_PROVIDER: hashing
      CHROMA_PERSIST_DIRECTORY: .chroma-ci
      VISION_PROVIDER: none
      OCR_PROVIDER: none
      SEARCH_PROVIDER: none
      IDENTIFICATION_CONFIDENCE_THRESHOLD: "0.5"
      PART_NUMBER_CONFIDENCE_THRESHOLD: "0.75"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-linux.txt
          python -m pip install pytest pytest-cov

      - name: Run pytest with coverage
        run: |
          pytest tests --cov=backend --cov-report=term-missing --cov-report=xml | tee coverage.txt

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.txt
            coverage.xml

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: coverage.txt

  deploy:
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f Dockerfile \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/visual-tech-assistant/backend:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/visual-tech-assistant/backend:latest \
            .

      - name: Push to Artifact Registry
        run: |
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/visual-tech-assistant/backend:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/visual-tech-assistant/backend:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy visual-tech-assistant \
            --image=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/visual-tech-assistant/backend:${{ github.sha }} \
            --region=${{ secrets.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --service-account=visual-tech-assistant@jobhunt-490400.iam.gserviceaccount.com \
            --min-instances=0 \
            --max-instances=3 \
            --concurrency=80 \
            --timeout=60 \
            --set-env-vars="VECTOR_STORE=chroma,GOOGLE_CLOUD_PROJECT=gen-lang-client-0680686270,GOOGLE_CLOUD_LOCATION=us-central1,VERTEX_PROJECT_ID=jobhunt-490400,VERTEX_AI_LOCATION=us-central1,FIRESTORE_PROJECT_ID=jobhunt-490400,FIRESTORE_COLLECTION=component_chunks" \
            --update-secrets="GOOGLE_API_KEY=GOOGLE_API_KEY:latest,TAVILY_API_KEY=TAVILY_API_KEY:latest"

      - name: Output Service URL
        run: |
          gcloud run services describe visual-tech-assistant \
            --region=${{ secrets.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)"

